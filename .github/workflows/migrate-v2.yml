name: Migrate Super Zoos Adventure V2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout new repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy V2 source from classic repository
        run: |
          git clone --depth 1 --branch feature/super-zoos-adventure-v2 \
            https://github.com/lifepilot-jared/super-zoos-dash.git /tmp/super-zoos-v2
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows' \
            /tmp/super-zoos-v2/ ./

      - name: Configure standalone Vite base path
        run: |
          cat > vite.config.ts <<'EOF'
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";

          export default defineConfig({
            plugins: [react()],
            base: process.env.NODE_ENV === "production"
              ? "/super-zoos-adventure-v2/"
              : "/",
          });
          EOF

      - name: Install standalone Pages workflow
        run: |
          rm -f .github/workflows/migrate-v2.yml
          cat > .github/workflows/deploy-pages.yml <<'EOF'
          name: Build and Deploy Super Zoos Adventure V2

          on:
            push:
              branches: [main]
            workflow_dispatch:

          env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: super-zoos-adventure-v2-pages
            cancel-in-progress: true

          jobs:
            build:
              name: Build standalone V2 game
              runs-on: ubuntu-latest
              timeout-minutes: 15
              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4
                - name: Configure GitHub Pages
                  uses: actions/configure-pages@v5
                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                - name: Install dependencies
                  run: npm install
                - name: Build production game
                  run: npm run build
                - name: Verify output
                  run: test -f dist/index.html
                - name: Upload Pages artifact
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: dist

            deploy:
              name: Deploy standalone V2 game
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              needs: build
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          EOF

      - name: Commit migrated V2 project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Migrate standalone Super Zoos Adventure V2" || exit 0
          git push origin main
