name: Migrate Super Zoos Adventure V2

# Manual-only safety workflow.
# This originally copied the old v2 branch from super-zoos-dash into this standalone repo.
# It must NOT run on every push, otherwise it overwrites standalone fixes.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout new repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone V2 source branch
        run: |
          git clone --depth 1 --branch feature/super-zoos-adventure-v2 \
            https://github.com/lifepilot-jared/super-zoos-dash.git /tmp/super-zoos-v2

      - name: Copy standalone V2 project
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='.github/workflows' \
            /tmp/super-zoos-v2/ ./

      - name: Configure standalone Vite base path
        run: |
          cat > vite.config.ts <<'EOF'
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";

          export default defineConfig({
            plugins: [react()],
            base: process.env.NODE_ENV === "production"
              ? "/super-zoos-adventure-v2/"
              : "/",
          });
          EOF

      - name: Verify migrated files
        run: |
          test -f package.json
          test -f src/App.tsx
          test -f src/v2/SuperZoosAdventureV2.tsx
          test -f public/images/characters/animation/peter-normal-run-01.png
          test -f public/images/characters/animation/judy-normal-run-01.png

      - name: Commit migrated V2 project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Migrate standalone Super Zoos Adventure V2" || exit 0
          git push origin main
